<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>To-Do App</title>
		<link rel="stylesheet" href="css/index.css" />
		<script src="index.js" defer></script>
	</head>
	<body>
		<main class="todo-app" role="application" aria-label="Aplicación de tareas">
			<header>
				<h1>Lista de Tareas</h1>
			</header>

			<form class="todo-form" autocomplete="off">
				<input type="text" class="todo-input" placeholder="Nueva tarea..." aria-label="Nueva tarea" />
				<button type="submit" class="todo-add">Agregar</button>
			</form>

			<section>
				<ul class="todo-list" aria-live="polite"></ul>
			</section>

			<footer class="todo-footer">
				<span class="todo-count">0 tareas pendientes</span>
			</footer>
		</main>
	</body>
</html>
